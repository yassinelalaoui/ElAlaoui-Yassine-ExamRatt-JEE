server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:creditdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: my-secret-key-enset-2026
  expiration-ms: 3600000

logging:
  level:
    org.springframework: INFO
    com.enset.exam.jee: DEBUG
